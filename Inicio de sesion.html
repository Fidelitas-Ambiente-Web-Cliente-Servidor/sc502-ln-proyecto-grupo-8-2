<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Iniciar Sesión | WorkMatch AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/Inicio.css">
    

</head>
<body class="d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html"><i class="bi bi-briefcase-fill"></i> WorkMatch</a>
        </div>
    </nav>

    <div class="container my-auto">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card p-4">
                    <div class="card-body">
                        <h2 class="text-center mb-4"><i class="bi bi-person-circle"></i> Iniciar Sesión</h2>
                        <form id="formLogin">
                            <div class="mb-3">
                                <label class="form-label">Correo Electrónico</label>
                                <input type="email" class="form-control" required placeholder="ejemplo@correo.com">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Contraseña</label>
                                <input type="password" class="form-control" required placeholder="••••••••">
                            </div>
                            <button type="submit" class="btn btn-primary w-100 mb-3 btn-success">Ingresar</button>
                        </form>
                        <div class="text-center mt-3">
                            <a href="recuperar-password.html" class="text-decoration-none">¿Olvidaste tu contraseña?</a>
                            <hr>
                            <p class="mb-0">¿No tienes cuenta? <a href="index.html" class="text-decoration-none">Regístrate aquí</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="text-center py-4 bg-dark text-white mt-auto">
         2026 WorkMatch | Universidad Fidélitas
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
