<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Experiencia Laboral | WorkMatch AI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <!-- NAVBAR -->

    <nav class="navbar navbar-expand-lg">

        <div class="container-fluid">

            <a class="navbar-brand" href="dashboard.html">

                <i class="bi bi-briefcase-fill"></i>
                WorkMatch 

            </a>

            <div class="ms-auto text-white">

                <i class="bi bi-person-circle"></i>
                

            </div>

        </div>

    </nav>

    <!-- SIDEBAR -->

    <div class="sidebar">

        <h5>Candidato</h5>

        <a href="dashboard.html">

            <i class="bi bi-speedometer2"></i>

            Panel Principal

        </a>

        <a href="perfil.html">

            <i class="bi bi-person-vcard"></i>

            Perfil Profesional

        </a>

        <a href="formacion.html">

            <i class="bi bi-mortarboard-fill"></i>

            Formación Académica

        </a>

        <a href="experiencia.html">

            <i class="bi bi-building-fill"></i>

            Experiencia Laboral

        </a>

        <a href="habilidades.html">

            <i class="bi bi-stars"></i>

            Gestión de Habilidades

        </a>

    </div>

    <!-- CONTENIDO -->

    <div class="content">

        <div class="d-flex justify-content-between align-items-center mb-4">

            <h2 class="page-title">

                Experiencia Laboral

            </h2>

            <button class="btn btn-primary"
                data-bs-toggle="modal"
                data-bs-target="#modalExperiencia">

                <i class="bi bi-plus-circle-fill"></i>

                Agregar Experiencia

            </button>

        </div>

        <div class="card">

            <div class="card-header bg-primary text-white">

                Historial Laboral

            </div>

            <div class="card-body">

                <table class="table table-hover align-middle">

                    <thead>

                        <tr>

                            <th>Empresa</th>
                            <th>Puesto</th>
                            <th>Inicio</th>
                            <th>Fin</th>
                            <th>Descripción</th>
                            <th>Acciones</th>

                        </tr>

                    </thead>

                    <tbody>

                        <tr>


                                <button class="btn btn-warning btn-sm text-white">

                                    <i class="bi bi-pencil-fill"></i>

                                </button>

                                <button class="btn btn-danger btn-sm">

                                    <i class="bi bi-trash-fill"></i>

                                </button>

                            </td>

                        </tr>

                        <tr>


                            <td>

                                <button class="btn btn-warning btn-sm text-white">

                                    <i class="bi bi-pencil-fill"></i>

                                </button>

                                <button class="btn btn-danger btn-sm">

                                    <i class="bi bi-trash-fill"></i>

                                </button>

                            </td>

                        </tr>

                    </tbody>

                </table>

            </div>

        </div>

        <!-- MODAL -->

        <div class="modal fade" id="modalExperiencia">

            <div class="modal-dialog modal-lg">

                <div class="modal-content">

                    <div class="modal-header bg-primary text-white">

                        <h5>

                            Registrar Experiencia Laboral

                        </h5>

                        <button class="btn-close btn-close-white"
                            data-bs-dismiss="modal"></button>

                    </div>

                    <div class="modal-body">

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Empresa

                                </label>

                                <input type="text"
                                    class="form-control">

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Puesto

                                </label>

                                <input type="text"
                                    class="form-control">

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Fecha de Inicio

                                </label>

                                <input type="date"
                                    class="form-control">

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Fecha de Finalización

                                </label>

                                <input type="date"
                                    class="form-control">

                            </div>

                            <div class="col-12">

                                <label class="form-label">

                                    Descripción del Puesto

                                </label>

                                <textarea
                                    class="form-control"
                                    rows="5"
                                    placeholder="Describa las funciones desempeñadas..."></textarea>

                            </div>

                        </div>

                    </div>

                    <div class="modal-footer">

                        <button class="btn btn-secondary"
                            data-bs-dismiss="modal">

                            Cancelar

                        </button>

                        <button class="btn btn-success">

                            Guardar

                        </button>

                    </div>

                </div>

            </div>

        </div>

        <footer>

            © 2026 WorkMatch  | Universidad Fidélitas

        </footer>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="js/script.js"></script>

</body>

</html>
