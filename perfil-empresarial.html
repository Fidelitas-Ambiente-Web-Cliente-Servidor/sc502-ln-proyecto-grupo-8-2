<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Perfil Empresarial | WorkMatch AI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/estilos.css">

</head>


<body>


<div class="d-flex">


    <!-- MENU LATERAL -->

    <aside class="menu">

        <h4 class="text-white text-center mb-4">
            WorkMatch AI
        </h4>


        <a href="panel.html">
            🏠 Panel
        </a>


        <a href="perfil-empresarial.html">
            🏢 Perfil Empresarial
        </a>


        <a href="crear-vacante.html">
            ➕ Crear Vacante
        </a>


        <a href="consultar-vacantes.html">
            📋 Vacantes
        </a>


        <a href="candidatos.html">
            👥 Candidatos
        </a>


        <a href="reportes.html">
            📊 Reportes
        </a>


    </aside>




    <!-- CONTENIDO -->

    <main class="contenido">


        <h2 class="fw-bold">
            Perfil Empresarial
        </h2>


        <p class="text-muted">
            Actualiza la información general de tu empresa.
        </p>





        <div class="card tarjeta mt-4">


            <div class="card-body">


                <form>


                    <div class="row">


                        <div class="col-md-6 mb-3">


                            <label class="form-label">
                                Nombre de Empresa
                            </label>


                            <input 
                            type="text"
                            class="form-control"
                            value="Tech Solutions">


                        </div>





                        <div class="col-md-6 mb-3">


                            <label class="form-label">
                                Correo Empresarial
                            </label>


                            <input 
                            type="email"
                            class="form-control"
                            value="contacto@empresa.com">


                        </div>


                    </div>






                    <div class="row">


                        <div class="col-md-6 mb-3">


                            <label class="form-label">
                                Teléfono
                            </label>


                            <input 
                            type="text"
                            class="form-control"
                            value="8888-8888">


                        </div>





                        <div class="col-md-6 mb-3">


                            <label class="form-label">
                                Ubicación
                            </label>


                            <input 
                            type="text"
                            class="form-control"
                            value="San José">


                        </div>


                    </div>







                    <div class="mb-3">


                        <label class="form-label">
                            Descripción Empresarial
                        </label>


                        <textarea 
                        class="form-control"
                        rows="5">Empresa dedicada al desarrollo de soluciones tecnológicas y servicios digitales.</textarea>


                    </div>






                    <div class="text-end">


                        <button 
                        type="submit"
                        class="btn btn-primary">


                            Guardar Cambios


                        </button>


                    </div>



                </form>



            </div>


        </div>





    </main>



</div>



</body>

</html>
