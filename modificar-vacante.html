<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Modificar Vacante | WorkMatch AI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/estilos.css">

</head>


<body>


<div class="d-flex">


    <!-- MENU LATERAL -->

    <aside class="menu">

        <h4 class="text-white text-center mb-4">
            WorkMatch AI
        </h4>


        <a href="panel.html">
            🏠 Panel
        </a>

        <a href="perfil.html">
            🏢 Perfil Empresarial
        </a>

        <a href="crear-vacante.html">
            ➕ Crear Vacante
        </a>

        <a href="consultar-vacantes.html">
            📋 Vacantes
        </a>

        <a href="candidatos.html">
            👥 Candidatos
        </a>

        <a href="reportes.html">
            📊 Reportes
        </a>


    </aside>





    <!-- CONTENIDO -->


    <main class="contenido">


        <h2 class="fw-bold">
            Modificar Vacante
        </h2>


        <p class="text-muted">
            Actualiza la información de la oferta laboral.
        </p>





        <div class="card tarjeta mt-4">


            <div class="card-body">


                <form>



                    <div class="row">


                        <div class="col-md-6 mb-3">


                            <label class="form-label">
                                Puesto
                            </label>


                            <input 
                            type="text"
                            class="form-control"
                            value="Desarrollador Web">


                        </div>




                        <div class="col-md-6 mb-3">


                            <label class="form-label">
                                Área
                            </label>


                            <select class="form-select">


                                <option selected>
                                    Tecnología
                                </option>

                                <option>
                                    Administración
                                </option>

                                <option>
                                    Finanzas
                                </option>


                            </select>


                        </div>


                    </div>







                    <div class="row">


                        <div class="col-md-6 mb-3">


                            <label class="form-label">
                                Salario
                            </label>


                            <input 
                            type="text"
                            class="form-control"
                            value="₡900000">


                        </div>




                        <div class="col-md-6 mb-3">


                            <label class="form-label">
                                Modalidad
                            </label>


                            <select class="form-select">


                                <option>
                                    Presencial
                                </option>

                                <option selected>
                                    Híbrido
                                </option>

                                <option>
                                    Remoto
                                </option>


                            </select>


                        </div>


                    </div>







                    <div class="mb-3">


                        <label class="form-label">
                            Descripción
                        </label>


                        <textarea 
                        class="form-control"
                        rows="4">Desarrollo y mantenimiento de aplicaciones web.</textarea>


                    </div>







                    <div class="mb-3">


                        <label class="form-label">
                            Requisitos
                        </label>


                        <textarea 
                        class="form-control"
                        rows="3">HTML, CSS, JavaScript, SQL, experiencia mínima 1 año.</textarea>


                    </div>






                    <button class="btn btn-primary">

                        Guardar Cambios

                    </button>



                    <a href="consultar-vacantes.html" 
                    class="btn btn-secondary">

                        Cancelar

                    </a>



                </form>


            </div>


        </div>



    </main>



</div>


</body>

</html>
