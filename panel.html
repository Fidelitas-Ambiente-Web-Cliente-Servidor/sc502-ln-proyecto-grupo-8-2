<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Panel Empresarial | WorkMatch AI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/estilos.css">

</head>


<body>


<div class="d-flex">


    <!-- MENU LATERAL -->

    <aside class="menu">

        <h4 class="text-white text-center mb-4">
            WorkMatch AI
        </h4>


        <a href="panel.html">
            🏠 Panel
        </a>

        <a href="./perfil-empresarial.html">
            🏢 Perfil Empresarial
        </a>

        <a href="crear-vacante.html">
            ➕ Crear Vacante
        </a>

        <a href="consultar-vacantes.html">
            📋 Vacantes
        </a>

        <a href="candidatos.html">
            👥 Candidatos
        </a>

        <a href="reportes.html">
            📊 Reportes
        </a>


    </aside>




    <!-- CONTENIDO -->

    <main class="contenido">


        <h2 class="fw-bold">
            Panel Principal
        </h2>

        <p class="text-muted">
            Resumen general de la empresa.
        </p>



        <div class="row g-4 mt-3">


            <div class="col-md-4">

                <div class="card tarjeta">

                    <div class="card-body">

                        <h5>
                            Vacantes Activas
                        </h5>

                        <h2 class="text-primary">
                            12
                        </h2>

                    </div>

                </div>

            </div>



            <div class="col-md-4">

                <div class="card tarjeta">

                    <div class="card-body">

                        <h5>
                            Candidatos
                        </h5>

                        <h2 class="text-success">
                            48
                        </h2>

                    </div>

                </div>

            </div>




            <div class="col-md-4">

                <div class="card tarjeta">

                    <div class="card-body">

                        <h5>
                            Vacantes Cerradas
                        </h5>

                        <h2 class="text-danger">
                            5
                        </h2>

                    </div>

                </div>

            </div>


        </div>





        <div class="card mt-5 tarjeta">


            <div class="card-body">


                <h5>
                    Últimas Vacantes
                </h5>


                <table class="table table-hover mt-3">


                    <thead>

                        <tr>

                            <th>
                                Puesto
                            </th>

                            <th>
                                Estado
                            </th>

                            <th>
                                Candidatos
                            </th>

                        </tr>

                    </thead>


                    <tbody>


                        <tr>

                            <td>
                                Desarrollador Web
                            </td>

                            <td>
                                <span class="badge bg-success">
                                    Activa
                                </span>
                            </td>

                            <td>
                                15
                            </td>

                        </tr>



                        <tr>

                            <td>
                                Soporte TI
                            </td>

                            <td>
                                <span class="badge bg-warning">
                                    Pendiente
                                </span>
                            </td>

                            <td>
                                8
                            </td>

                        </tr>


                    </tbody>


                </table>


            </div>


        </div>



    </main>


</div>


</body>

</html>
