<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Perfil Empresarial | WorkMatch AI</title>

    <link rel="stylesheet" href="css/estilos.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>


<body>


<div class="contenedor">


    <!-- MENU LATERAL -->


    <aside class="sidebar">


        <div class="logo">

            <h2>WorkMatch AI</h2>

        </div>



        <ul>


            <li>
                <a href="index.html">
                    <i class="fas fa-home"></i> Panel
                </a>
            </li>


            <li>
                <a href="perfil-empresa.html">
                    <i class="fas fa-building"></i> Perfil Empresarial
                </a>
            </li>


            <li>
                <a href="crear-vacante.html">
                    <i class="fas fa-plus-circle"></i> Crear Vacante
                </a>
            </li>


            <li>
                <a href="consultar-vacantes.html">
                    <i class="fas fa-list"></i> Consultar Vacantes
                </a>
            </li>


            <li>
                <a href="modificar-vacante.html">
                    <i class="fas fa-pen"></i> Modificar Vacantes
                </a>
            </li>


            <li>
                <a href="eliminar-vacante.html">
                    <i class="fas fa-trash"></i> Eliminar Vacantes
                </a>
            </li>


            <li>
                <a href="candidatos.html">
                    <i class="fas fa-users"></i> Gestión de Candidatos
                </a>
            </li>


            <li>
                <a href="reportes.html">
                    <i class="fas fa-chart-bar"></i> Reportes
                </a>
            </li>


        </ul>


    </aside>





    <!-- CONTENIDO -->


    <main class="content">


        <header>


            <h1 class="page-title">
                Perfil Empresarial
            </h1>



            <div class="usuario">

                <i class="fas fa-user-circle"></i>

                Empresa Demo

            </div>


        </header>





        <section class="card">


            <div class="profile-img" style="text-align:center; padding-top:20px;">


                <i class="fas fa-building fa-5x"></i>


                <h3>
                    Logo de la Empresa
                </h3>


            </div>





            <form id="perfilForm">


                <div class="mb-3">


                    <label>
                        Nombre de la Empresa
                    </label>


                    <input 
                    type="text"
                    class="form-control"
                    value="WorkMatch Technologies">


                </div>





                <div class="mb-3">


                    <label>
                        Correo Empresarial
                    </label>


                    <input 
                    type="email"
                    class="form-control"
                    value="empresa@workmatch.com">


                </div>





                <div class="mb-3">


                    <label>
                        Teléfono
                    </label>


                    <input 
                    type="text"
                    class="form-control"
                    value="8888-8888">


                </div>





                <div class="mb-3">


                    <label>
                        Dirección
                    </label>


                    <input 
                    type="text"
                    class="form-control"
                    value="San José, Costa Rica">


                </div>





                <div class="mb-3">


                    <label>
                        Sitio Web
                    </label>


                    <input 
                    type="text"
                    class="form-control"
                    value="www.workmatch.com">


                </div>





                <div class="mb-3">


                    <label>
                        Industria
                    </label>


                    <select class="form-select">


                        <option selected>
                            Tecnología
                        </option>


                        <option>
                            Finanzas
                        </option>


                        <option>
                            Educación
                        </option>


                        <option>
                            Salud
                        </option>


                    </select>


                </div>





                <div class="mb-3">


                    <label>
                        Descripción
                    </label>


                    <textarea 
                    class="form-control"
                    rows="6">Empresa dedicada al desarrollo de soluciones tecnológicas enfocadas en reclutamiento inteligente.</textarea>


                </div>





                <button type="submit" class="btn btn-success">


                    <i class="fas fa-save"></i>

                    Guardar Cambios


                </button>



            </form>


        </section>





        <footer>

            © 2026 WorkMatch AI

        </footer>



    </main>



</div>




<script src="js/script.js"></script>


</body>


</html>
