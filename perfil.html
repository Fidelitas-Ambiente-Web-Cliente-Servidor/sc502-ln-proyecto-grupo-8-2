<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Perfil Profesional | WorkMatch </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <!-- =NAVBAR= -->

    <nav class="navbar navbar-expand-lg">

        <div class="container-fluid">

            <a class="navbar-brand" href="dashboard.html">

                <i class="bi bi-briefcase-fill"></i>
                WorkMatch 

            </a>

            <div class="ms-auto text-white">

                <i class="bi bi-person-circle"></i>
                Luis Elizondo
            </div>

        </div>

    </nav>

    <!-- =SIDEBAR= -->

    <div class="sidebar">

        <h5>Candidato</h5>

        <a href="dashboard.html">
            <i class="bi bi-speedometer2"></i>
            Panel Principal
        </a>

        <a href="perfil.html">
            <i class="bi bi-person-vcard-fill"></i>
            Perfil Profesional
        </a>

        <a href="formacion.html">
            <i class="bi bi-mortarboard-fill"></i>
            Formación Académica
        </a>

        <a href="experiencia.html">
            <i class="bi bi-building"></i>
            Experiencia Laboral
        </a>

        <a href="habilidades.html">
            <i class="bi bi-stars"></i>
            Gestión de Habilidades
        </a>

    </div>

    <!-- =CONTENIDO = -->

    <div class="content">

        <h2 class="page-title">

            Perfil Profesional

        </h2>

        <div class="row">

            <!-- FOTO -->

            <div class="col-lg-4">

                <div class="card">

                    <div class="card-body text-center">

                        <img src="https://via.placeholder.com/170"
                            class="profile-img">

                        <h4 class="mt-3">

                            

                        </h4>

                        <p class="text-muted">

                            

                        </p>

                        <button class="btn btn-primary">

                            <i class="bi bi-camera-fill"></i>

                            Cambiar Foto

                        </button>

                        <hr>

                        <h6>

                            Perfil Completo

                        </h6>

                        <div class="progress">

                            <div class="progress-bar bg-success"
                                style="width: 50%;">

                                

                            </div>

                        </div>

                    </div>

                </div>

            </div>

            <!-- =FORMULARIO= -->

            <div class="col-lg-8">

                <div class="card">

                    <div class="card-header bg-primary text-white">

                        Información Personal

                    </div>

                    <div class="card-body">

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Nombre

                                </label>

                                <input
                                    type="text"
                                    class="form-control"
                                    value="">

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Apellidos

                                </label>

                                <input
                                    type="text"
                                    class="form-control"
                                    value="">

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Correo Electrónico

                                </label>

                                <input
                                    type="email"
                                    class="form-control"
                                    value="">

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Teléfono

                                </label>

                                <input
                                    type="text"
                                    class="form-control"
                                    value="">

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Fecha de Nacimiento

                                </label>

                                <input
                                    type="date"
                                    class="form-control">

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Provincia

                                </label>

                                <select class="form-select">

                                    <option>San José</option>
                                    <option>Alajuela</option>
                                    <option>Cartago</option>
                                    <option>Heredia</option>
                                    <option>Puntarenas</option>
                                    <option>Limón</option>
                                    <option>Guanacaste</option>

                                </select>

                            </div>

                            <div class="col-12 mb-3">

                                <label class="form-label">

                                    Dirección

                                </label>

                                <input
                                    type="text"
                                    class="form-control"
                                    placeholder="Ingrese su dirección">

                            </div>

                            <div class="col-12">

                                <label class="form-label">

                                    Acerca de mí

                                </label>

                                <textarea
                                    rows="5"
                                    class="form-control"
                                    placeholder="Escriba una breve descripción profesional..."></textarea>

                            </div>

                        </div>

                        <div class="mt-4">

                            <button class="btn btn-success">

                                <i class="bi bi-check-circle-fill"></i>

                                Guardar Cambios

                            </button>

                            <button class="btn btn-secondary">

                                <i class="bi bi-arrow-counterclockwise"></i>

                                Cancelar

                            </button>

                        </div>

                    </div>

                </div>

            </div>

        </div>

        <footer>

            © 2026 WorkMatch  | Universidad Fidélitas

        </footer>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="js/script.js"></script>

</body>

</html>
