<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Recuperar Contraseña | WorkMatch AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/Inicio.css">
    <script src="js/Inicio.js"></script>

</head>
<body class="d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html"><i class="bi bi-briefcase-fill"></i> WorkMatch</a>
        </div>
    </nav>

    <div class="container my-auto">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card p-4">
                    <div class="card-body">
                        <h2 class="text-center mb-3"><i class="bi bi-shield-lock"></i> Recuperar Acceso</h2>
                        <p class="text-muted text-center mb-4">Ingrese su correo electrónico registrado. Le enviaremos un enlace seguro para restablecer su contraseña.</p>
                        <form>
                            <div class="mb-4">
                                <label class="form-label">Correo Electrónico</label>
                                <input type="email" class="form-control" required placeholder="ejemplo@correo.com">
                            </div>
                            <button type="submit" class="btn btn-success w-100 mb-2">Enviar Instrucciones</button>
                            <a href="login.html" class="btn btn-secondary w-100">Volver al Login</a>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="text-center py-4 bg-dark text-white mt-auto">
        © 2026 WorkMatch | Universidad Fidélitas
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
